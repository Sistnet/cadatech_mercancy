active_subscription:
  store: active_store
  subscription_plan: pro_plan
  external_id: <%= SecureRandom.uuid %>
  status: active
  started_at: <%= 1.month.ago %>
  ends_at: <%= 11.months.from_now %>
  billing_cycle: monthly
  price_paid: 99.90
  created_at: <%= 1.month.ago %>
  updated_at: <%= 1.month.ago %>

trial_subscription:
  store: trial_store
  subscription_plan: basic_plan
  external_id: <%= SecureRandom.uuid %>
  status: trial
  started_at: <%= Time.current %>
  trial_ends_at: <%= 2.days.from_now %>
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>

cancelled_subscription:
  store: inactive_store
  subscription_plan: basic_plan
  external_id: <%= SecureRandom.uuid %>
  status: cancelled
  started_at: <%= 3.months.ago %>
  cancelled_at: <%= 1.week.ago %>
  billing_cycle: monthly
  price_paid: 49.90
  created_at: <%= 3.months.ago %>
  updated_at: <%= 1.week.ago %>

expiring_subscription:
  store: old_store
  subscription_plan: pro_plan
  external_id: <%= SecureRandom.uuid %>
  status: active
  started_at: <%= 2.months.ago %>
  ends_at: <%= 5.days.from_now %>
  billing_cycle: yearly
  price_paid: 959.00
  created_at: <%= 2.months.ago %>
  updated_at: <%= 2.months.ago %>
